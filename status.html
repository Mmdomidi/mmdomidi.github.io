<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedicated Email Reservation Status</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="status.css" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="status.css">
    </noscript>
</head>
<body>
    <div class="container">
        <div id="statusMessage">
            <div class="status-icon">
                <i class="fas fa-spinner fa-spin"></i>
            </div>
            <h2>Checking status...</h2>
            <p>Please wait a moment</p>
        </div>

        <div class="features-section">
            <h3>Benefits of a Dedicated Email</h3>
            <div class="features-grid">
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="feature-content">
                        <h4>Professional Identity</h4>
                        <p>Email with @mohammad-omidi.ir domain for your business</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="feature-content">
                        <h4>Advanced Security</h4>
                        <p>Protection for your data and emails</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-sync"></i>
                    </div>
                    <div class="feature-content">
                        <h4>Easy Synchronization</h4>
                        <p>Access your email from any device and location</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingModal" class="modal">
        <div class="modal-content">
            <div class="loading-spinner"></div>
            <p>Please wait...</p>
        </div>
    </div>

    <script src="status.js" defer></script>
</body>
</html>
